name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux-x86_64
            os: ubuntu-22.04

          - name: macOS-ARM64
            os: macos-latest

          - name: macOS-x86_64
            os: macos-13

          - name: Windows-x86_64
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Node + pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install
        working-directory: .

      # Rust (native host target per runner)
      - uses: dtolnay/rust-toolchain@stable

      # Linux: Tauri + Tectonic system deps
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev \
            libicu-dev libgraphite2-dev libharfbuzz-dev \
            libfreetype-dev libfontconfig-dev

      # macOS: Tectonic system deps
      - if: runner.os == 'macOS'
        run: |
          brew install icu4c harfbuzz pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/opt/icu4c/lib/pkgconfig:$(brew --prefix)/opt/harfbuzz/lib/pkgconfig" >> "$GITHUB_ENV"

      # Windows: vcpkg + Tectonic deps
      - if: runner.os == 'Windows'
        run: |
          vcpkg integrate install
          vcpkg install harfbuzz[graphite2] freetype icu fontconfig --triplet x64-windows-static
          echo "TECTONIC_DEP_BACKEND=vcpkg" >> "$env:GITHUB_ENV"
          echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> "$env:GITHUB_ENV"

      # Build Vite frontend
      - name: Build frontend
        run: pnpm build
        working-directory: apps/desktop

      # Build Tauri (produces .deb/.AppImage/.dmg/.msi/.exe)
      - name: Build Tauri
        run: npx tauri build
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      # Upload per-platform artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage*
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  # Publish: collect all artifacts and create GitHub Release
  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f -ls

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "TectonicEditor ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: artifacts/**/*
